name: Merge-by

on:
    pull_request:
      types: [opened, ready_for_review, converted_to_draft]
    pull_request_review:
      types: [submitted]
    push:
      branches:
        - main
        - next
    workflow_dispatch:
    schedule:
    - cron: "0 11 * * *"
jobs:
    rfr_add_date:
        name: "Build table and notify users"
        runs-on: ubuntu-slim
        permissions:
            discussions: write
            pull-requests: write
        steps:
            - uses: zowe-actions/shared-actions/merge-by@77d7d9b50e60fedc8132b5e5eb6d611c4e483416 # main
              with:
                operation: "build-table"